<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#000000" />
    <title>JollibeeAR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
    <script>
      AFRAME.registerComponent('emote-switcher', {
        init: function () {
          this._showBee     = true;
          this._popElapsed  = 0;       // -1 = done, >=0 = animating
          this._firstSwitch = true;
          var self = this;

          document.querySelector('a-scene').addEventListener('arReady', function () {
            document.getElementById('no-face').style.display = 'none';
            // kick off the very first popup
            self._popElapsed = 0;
          });

          setInterval(function () {
            self._showBee = !self._showBee;
            self._popElapsed = 0; // restart popup on every switch
          }, 1000);
        },

        tick: function (time, timeDelta) {
          var bee   = document.getElementById('bee-img');
          var jolli = document.getElementById('jolli-img');
          if (!bee || !jolli) return;

          bee.object3D.visible   = this._showBee;
          jolli.object3D.visible = !this._showBee;

          if (this._popElapsed >= 0 && this._popElapsed < 500) {
            var t = this._popElapsed / 500;
            var s = t < 0.55
              ? (t / 0.55) * 1.35
              : 1.35 - ((t - 0.55) / 0.45) * 0.35;
            bee.object3D.scale.set(s, s, s);
            jolli.object3D.scale.set(s, s, s);
            this._popElapsed += timeDelta;
          } else if (this._popElapsed >= 500) {
            bee.object3D.scale.set(1, 1, 1);
            jolli.object3D.scale.set(1, 1, 1);
            this._popElapsed = -1;
          }
        }
      });
    </script>
    <style>
      body {
        margin: 0;
        background: #000;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      html, body {
        height: 100%;
        height: -webkit-fill-available;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #no-face {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: rgba(255,255,255,0.85);
        pointer-events: none;
        z-index: 50;
        font-family: sans-serif;
        text-align: center;
      }
      #no-face span { font-size: 3rem; }
      #no-face p    { font-size: 1rem; }
      #top-bar {
        position: fixed;
        top: 0; left: 0; right: 0;
        padding-top: max(12px, env(safe-area-inset-top));
        padding-left: max(16px, env(safe-area-inset-left));
        padding-right: max(16px, env(safe-area-inset-right));
        padding-bottom: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
        z-index: 100;
        font-family: sans-serif;
        color: #fff;
      }
      #app-title { font-weight: bold; font-size: 1.1rem; }
      #snap-btn {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        min-width: 48px;
        min-height: 48px;
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>
  <body>
    <div id="top-bar">
      <span id="app-title">JollibeeAR</span>
      <button id="snap-btn" title="Take screenshot">📸</button>
    </div>

    <div id="no-face">
      <span>😶</span>
      <p>Point your camera at a face</p>
    </div>

    <div class="example-container">
      <a-scene mindar-face emote-switcher embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
          <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
          <img id="bee-tex"   src="assets/emotes/bee.png" />
          <img id="jolli-tex" src="assets/emotes/Jolli.png" />
        </a-assets>

        <a-camera active="false" position="0 0 0"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
          <a-gltf-model mindar-face-occluder position="0 -0.3 0.15" rotation="0 0 0" scale="0.065 0.065 0.065" src="#headModel"></a-gltf-model>
        </a-entity>

        <a-entity id="anchor-168" mindar-face-target="anchorIndex: 168">
          <a-image id="bee-img"
                   src="#bee-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="true"></a-image>
          <a-image id="jolli-img"
                   src="#jolli-tex"
                   position="0 0.7 0"
                   width="1.2" height="1.2"
                   transparent="true"
                   visible="false"></a-image>
        </a-entity>
      </a-scene>
    </div>
  </body>
</html>
